<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>toggleDisplay multi-source test</title>
  <style>
    li.clr { margin: 8px 0; padding: 8px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>同一 source 複数登録テスト</h1>
  <ul>
    <li class="clr">
      <label><input type="radio" name="wf99999000001" value="test_option_a"> テスト選択肢A</label>
    </li>
    <li class="clr">
      <label><input type="radio" name="wf99999000001" value="test_option_b"> テスト選択肢B</label>
    </li>
    <li class="clr">
      <label><input type="radio" name="wf99999000001" value="test_option_c"> テスト選択肢C</label>
    </li>
    <li class="clr" id="target11">
      <input type="text" name="wf99999000011" placeholder="target 11">
    </li>
    <li class="clr" id="target12">
      <input type="text" name="wf99999000012" placeholder="target 12">
    </li>
    <li class="clr" id="target13">
      <input type="text" name="wf99999000013" placeholder="target 13">
    </li>
  </ul>
  <div id="result"></div>

  <script src="helpers.js"></script>
  <script src="../dist/td.js"></script>
  <script>
    function runSetup() {
      toggleDisplay({
        source: { selector: "wf99999000001", values: ["test_option_a"] },
        targets: [{ selector: "wf99999000011", required: true }],
      });
      toggleDisplay({
        source: { selector: "wf99999000001", values: ["test_option_b"] },
        targets: [{ selector: "wf99999000013", required: true }],
      });
      toggleDisplay({
        source: { selector: "wf99999000001", values: ["test_option_c"] },
        targets: [{ selector: "wf99999000012", required: true }],
      });
    }

    function selectRadio(value) {
      const radio = document.querySelector(`[name="wf99999000001"][value="${value}"]`);
      radio.checked = true;
      radio.dispatchEvent(new Event("change", { bubbles: true }));
    }

    runSetup();

    assert("初期: target11 非表示", !isTargetVisibleById("target11"));
    assert("初期: target12 非表示", !isTargetVisibleById("target12"));
    assert("初期: target13 非表示", !isTargetVisibleById("target13"));

    selectRadio("test_option_a");
    assert("選択A: target11 表示", isTargetVisibleById("target11"));
    assert("選択A: target12 非表示", !isTargetVisibleById("target12"));
    assert("選択A: target13 非表示", !isTargetVisibleById("target13"));

    selectRadio("test_option_b");
    assert("選択B: target11 非表示", !isTargetVisibleById("target11"));
    assert("選択B: target12 非表示", !isTargetVisibleById("target12"));
    assert("選択B: target13 表示", isTargetVisibleById("target13"));

    selectRadio("test_option_c");
    assert("選択C: target11 非表示", !isTargetVisibleById("target11"));
    assert("選択C: target12 表示", isTargetVisibleById("target12"));
    assert("選択C: target13 非表示", !isTargetVisibleById("target13"));

    runSetup();
    selectRadio("test_option_a");
    assert("pageshow後: target11 表示", isTargetVisibleById("target11"));
    assert("pageshow後: target12 非表示", !isTargetVisibleById("target12"));
    assert("pageshow後: target13 非表示", !isTargetVisibleById("target13"));

    showAllPassed();
  </script>
</body>
</html>
